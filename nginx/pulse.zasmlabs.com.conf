# /etc/nginx/sites-available/pulse.zasmlabs.com
# Symlink: ln -s /etc/nginx/sites-available/pulse.zasmlabs.com /etc/nginx/sites-enabled/
# SSL:     certbot --nginx -d pulse.zasmlabs.com

server {
    listen 80;
    server_name pulse.zasmlabs.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name pulse.zasmlabs.com;

    ssl_certificate     /etc/letsencrypt/live/pulse.zasmlabs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pulse.zasmlabs.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # API — proxy to backend
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Frontend — proxy to nginx container
    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
