services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pulse']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    ports:
      - '3001:3001'
    volumes:
      - ./backend/src:/app/backend/src
      - ./packages:/app/packages
    environment:
      DATABASE_URL: postgresql://pulse:pulse@postgres:5432/pulse
      REDIS_URL: redis://redis:6379
      PORT: 3001
      NODE_ENV: development
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    ports:
      - '5173:5173'
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./packages:/app/packages
    environment:
      VITE_API_URL: http://localhost:3001
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
