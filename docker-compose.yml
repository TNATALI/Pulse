services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pulse']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    environment:
      DATABASE_URL: postgresql://pulse:pulse@postgres:5432/pulse
      REDIS_URL: redis://redis:6379
      PORT: 3000
      NODE_ENV: development
      LOG_LEVEL: debug
      ENCRYPTION_KEY: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '3000:3000'
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/backend/src
        - action: sync
          path: ./packages/shared/src
          target: /app/packages/shared/src
        - action: rebuild
          path: ./backend/package.json

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: dev
    environment:
      BACKEND_URL: http://backend:3000
    depends_on:
      - backend
    ports:
      - '5173:5173'
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/frontend/src
        - action: sync
          path: ./frontend/vite.config.ts
          target: /app/frontend/vite.config.ts
        - action: sync
          path: ./packages/shared/src
          target: /app/packages/shared/src
        - action: rebuild
          path: ./frontend/package.json

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  redisdata:
