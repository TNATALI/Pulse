services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - pulse_net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pulse']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    networks:
      - pulse_net
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: zasmlabs/pulse-backend:latest
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://pulse:pulse@postgres:5432/pulse
      REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - '127.0.0.1:8080:3000'
    networks:
      - pulse_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: zasmlabs/pulse-frontend:latest
    restart: unless-stopped
    ports:
      - '127.0.0.1:8081:5173'
    networks:
      - pulse_net

volumes:
  pgdata:
  redisdata:

networks:
  pulse_net:
    driver: bridge
