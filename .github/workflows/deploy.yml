name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build production images
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml build backend frontend

      - name: Push images to Docker Hub
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml push backend frontend

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: SSH and restart services
        uses: appleboy/ssh-action@v1
        with:
          host: 192.241.251.223
          username: deployer
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/apps/deployment
            docker compose pull
            docker compose up -d
            docker image prune -f
